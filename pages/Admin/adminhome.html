<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="shortcut icon" href="./images/Mang_Inasal.svg">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<link href="https://fonts.cdnfonts.com/css/general-sans" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<title>Admin Dashboard | Mang Inasal Kiosk</title>

</head>


<body class="bg-gray-100">


<div class="flex min-h-screen">


<!-- SIDEBAR -->

<aside id="sidebar"
class="fixed lg:static inset-y-0 left-0 w-72 bg-white shadow-xl transform -translate-x-full lg:translate-x-0 transition duration-300 z-50">


<div class="p-5 border-b flex items-center gap-3">

<img src="./images/Mang_Inasal.svg"
class="w-14">

<h1 class="font-bold text-xl">
Admin Panel
</h1>

</div>



<nav class="p-5 space-y-3">


<a href="adminhome.html"
class="flex items-center gap-3 p-3 rounded-lg bg-[#009436] text-white">

<i class="fa fa-chart-line"></i>
Dashboard

</a>


<a href="menu.html"
class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100">

<i class="fa fa-utensils"></i>
Menu

</a>


<a href="orders.html"
class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100">

<i class="fa fa-receipt"></i>
Orders

</a>


<a href="users.html"
class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100">

<i class="fa fa-users"></i>
Users

</a>


<a href="inventory.html"
class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100">

<i class="fa fa-box"></i>
Inventory

</a>


<a href="reports.html"
class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100">

<i class="fa fa-file-chart-column"></i>
Reports

</a>



<button id="logout"
class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-100 text-red-600 w-full">


<i class="fa fa-right-from-bracket"></i>

Logout

</button>



</nav>


</aside>





<!-- OVERLAY MOBILE -->

<div id="overlay"
class="hidden fixed inset-0 bg-black/40 z-40">
</div>





<!-- MAIN -->


<main class="flex-1">


<header class="bg-white shadow p-5 flex items-center justify-between">


<button id="menuBtn"
class="lg:hidden text-2xl">

<i class="fa fa-bars"></i>

</button>



<h1 class="font-bold text-xl">

Dashboard

</h1>


<p class="hidden lg:block font-semibold">

Welcome Admin

</p>


</header>




<section class="p-5">


<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">



<div class="bg-white p-5 rounded-xl shadow">

<div class="flex justify-between">

<h2 class="font-semibold">
Today's Sales
</h2>

<i class="fa fa-money-bill text-[#009436] text-2xl"></i>

</div>


<p id="sales" class="text-3xl font-bold mt-5">
₱0
</p>


</div>





<div class="bg-white p-5 rounded-xl shadow">

<div class="flex justify-between">

<h2 class="font-semibold">
Orders
</h2>

<i class="fa fa-cart-shopping text-[#009436] text-2xl"></i>

</div>


<p id="orders" class="text-3xl font-bold mt-5">
0
</p>


</div>






<div class="bg-white p-5 rounded-xl shadow">

<div class="flex justify-between">

<h2 class="font-semibold">
Products
</h2>

<i class="fa fa-box text-[#009436] text-2xl"></i>

</div>


<p id="products" class="text-3xl font-bold mt-5">
0
</p>


</div>







<div class="bg-white p-5 rounded-xl shadow">

<div class="flex justify-between">

<h2 class="font-semibold">
Pending

</h2>

<i class="fa fa-clock text-[#009436] text-2xl"></i>

</div>


<p id="pending" class="text-3xl font-bold mt-5">
0
</p>


</div>



</div>





<div class="bg-white mt-8 rounded-xl shadow p-5">


<h2 class="font-bold text-xl mb-5">
Recent Orders
</h2>


<div id="recentOrders"
class="space-y-3">

<div class="text-gray-500 text-center py-10">
No orders yet
</div>

</div>


</div>



</section>


</main>


</div>



<script type="module" src="./script/adminhome.js"></script>


</body>

</html>
